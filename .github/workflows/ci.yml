name: Formily CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # 2. 设置 Node.js 环境（调整缓存为 npm）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          npm ci # 严格按package-lock.json安装，禁用版本更新
          npm list # 可选：打印依赖列表，方便调试
      # 4. Prettier 格式校验
      - name: Run Prettier check
        run: npm run format:check
      # 5. TypeScript 类型检查
      - name: Run TypeScript type check
        run: npx tsc --noEmit
      # 6. ESLint 代码质量检查
      - name: Run ESLint Check
        run: npm run lint
      # 7. 运行单测
      - name: Run test
        run: npm run test:ci
      # 8. 执行构建
      - name: Build project
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run build
      # 9. 上传构建产物
      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: core-build-output
          path: build/
          retention-days: 7
      # 10. 上传静态文件为Pages工件
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: "build/"
      # 11. 部署到 GitHub Pages（官方套件，无需额外指定目录）
      - id: deploy
        name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}
  release-please:
    needs: [validate-and-build]
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Print release outputs for debugging
        continue-on-error: true
        run: |
          echo "Release outputs (write to file first):"
          echo '${{ toJson(steps.release.outputs) }}' > release-outputs.json
          cat release-outputs.json
